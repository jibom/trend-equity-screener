name: HSI Timing Daily

# 每日港股收盘后跑 backtest (个股breadth) + plot (HSI指数), 推 HTML 到 GitHub Pages。
# backtest 走 hk_data (jianxin→EODHD→yfinance), jianxin 港股停更时自动从 EODHD 补个股尾部 → 市场宽度等也更新。
# DB 连接走 data_provider 默认值 (jianxin Aliyun RDS, 公网可达)。

on:
  schedule:
    - cron: '7 13 * * 1-5'   # UTC 13:07 = HKT 21:07, Mon-Fri (HSI 收盘后数据落定)
  workflow_dispatch:
    inputs:
      end:
        description: 'End date YYYY-MM-DD (默认今天 UTC)'
        required: false
        default: ''

concurrency:
  group: hsi-timing
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine end date
        id: d
        run: |
          END="${{ github.event.inputs.end }}"
          [ -z "$END" ] && END=$(date -u +%F)
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "End date: $END"

      - name: Run backtest (抄底+逃顶 breadth, jianxin→EODHD→yfinance)
        run: python scripts/backtest_hsi_combined.py --start 2014-01-01 --end ${{ steps.d.outputs.end }}
        env:
          PYTHONIOENCODING: utf-8
          EODHD_KEY: ${{ secrets.EODHD_KEY }}

      - name: Build combined 2-tab HTML (读 fresh CSV + 拉最新 HSI OHLC)
        run: python scripts/plot_combined_tabs.py
        env:
          PYTHONIOENCODING: utf-8
          EODHD_KEY: ${{ secrets.EODHD_KEY }}

      - name: Publish HTML to public/
        run: |
          mkdir -p public
          cp output/hsi_timing_combined.html public/hsi_timing_combined.html

      - name: Commit & push HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/hsi_timing_combined.html
          git diff --staged --quiet || git commit -m "HSI timing daily update $(date -u +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
