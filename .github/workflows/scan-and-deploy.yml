name: Scan & Deploy

on:
  # 每天 5 次 (UTC 时间)
  # HKT 05:00 = UTC 21:00 (前一天) — 美股收盘后
  # HKT 08:00 = UTC 00:00 — 港股开盘前
  # HKT 16:30 = UTC 08:30 — 港股收盘后
  # HKT 22:00 = UTC 14:00 — 美股盘中
  # HKT 23:00 = UTC 15:00 — 美股开盘后30分钟 (夏令时)
  schedule:
    - cron: '0 21 * * 1-5'   # HKT 05:00 (Mon-Fri)
    - cron: '0 0 * * 1-5'    # HKT 08:00 (Mon-Fri)
    - cron: '30 8 * * 1-5'   # HKT 16:30 (Mon-Fri)
    - cron: '0 14 * * 1-5'   # HKT 22:00 (Mon-Fri)
    - cron: '0 15 * * 2-6'   # HKT 23:00 (Tue-Sat) — US open +30min

  # 手动触发
  workflow_dispatch:
    inputs:
      market:
        description: 'Which market to scan'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - us
          - hk

# 确保同一时间只跑一个 workflow
concurrency:
  group: scan-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt && pip list | grep -iE "yfinance|anthropic|pandas|pymysql|sqlalchemy|openpyxl"

      - name: Determine which markets to scan
        id: markets
        run: |
          MARKET="${{ github.event.inputs.market || 'all' }}"
          HOUR=$(date -u +%H)

          if [ "$MARKET" = "all" ]; then
            # Auto-detect based on schedule time
            # UTC 21:00 (HKT 05:00) → US (美股刚收盘)
            # UTC 00:00 (HKT 08:00) → HK (港股开盘前)
            # UTC 08:30 (HKT 16:30) → HK (港股收盘后)
            # UTC 14:00 (HKT 22:00) → all
            # UTC 15:00 (HKT 23:00) → us
            if [ "$HOUR" = "21" ]; then
              MARKET="us"
            elif [ "$HOUR" = "15" ]; then
              MARKET="us"
            elif [ "$HOUR" = "00" ] || [ "$HOUR" = "08" ]; then
              MARKET="hk"
            else
              MARKET="all"
            fi
          fi
          echo "market=$MARKET" >> $GITHUB_OUTPUT
          echo "Scanning: $MARKET"

      - name: Run US scanner
        if: steps.markets.outputs.market == 'us' || steps.markets.outputs.market == 'all'
        run: python scripts/scan_us.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Run HK scanner (v5.4)
        if: steps.markets.outputs.market == 'hk' || steps.markets.outputs.market == 'all'
        run: python scripts/scan_hk_v54.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Run HK KDJ divergence scanner
        if: steps.markets.outputs.market == 'hk' || steps.markets.outputs.market == 'all'
        run: python scripts/scan_kdj_divergence.py
        env:
          PYTHONIOENCODING: utf-8
          KDJ_ASOF: ''
        continue-on-error: true

      - name: Export trend hotspot (Part1-4 → 港股-趋势 tab)
        if: steps.markets.outputs.market == 'hk' || steps.markets.outputs.market == 'all'
        run: python scripts/export_trend_hotspot.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Export HK chartdata (1y daily+weekly for 港股-趋势 个股图)
        if: steps.markets.outputs.market == 'hk' || steps.markets.outputs.market == 'all'
        run: python scripts/export_chartdata.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Export US trend hotspot (Part1-5 → 美股-趋势 tab)
        if: steps.markets.outputs.market == 'us' || steps.markets.outputs.market == 'all'
        run: python scripts/export_trend_us.py --asof $(date -u +%F)
        env:
          PYTHONIOENCODING: utf-8
          EODHD_KEY: ${{ secrets.EODHD_KEY }}

      - name: Export US chartdata (1y daily+weekly for 美股-趋势 个股图)
        if: steps.markets.outputs.market == 'us' || steps.markets.outputs.market == 'all'
        run: python scripts/export_chartdata_us.py --asof $(date -u +%F)
        env:
          PYTHONIOENCODING: utf-8
          EODHD_KEY: ${{ secrets.EODHD_KEY }}

      - name: Build A-share universe (top600 by 成交金额 + 申万一级/三级)
        if: steps.markets.outputs.market == 'hk' || steps.markets.outputs.market == 'all'
        run: python scripts/build_a_universe.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Export A-share trend hotspot (Part1-4 → A股-趋势 tab)
        if: steps.markets.outputs.market == 'hk' || steps.markets.outputs.market == 'all'
        run: python scripts/export_trend_a.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Export A-share chartdata (1y daily+weekly for A股-趋势 个股图)
        if: steps.markets.outputs.market == 'hk' || steps.markets.outputs.market == 'all'
        run: python scripts/export_chartdata_a.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Classify stocks
        run: python scripts/classify_stocks.py --market all
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json public/data/chartdata/
          git diff --staged --quiet || git commit -m "Update scan data $(date -u +'%Y-%m-%d %H:%M UTC')"
          # main 可能在 checkout 与 push 之间被别的 run/手动推送推进 (非 fast-forward)，
          # 先 rebase 再 push，避免 push 被拒导致整个 job 失败、deploy 被跳过。
          # --autostash: 扫描步骤会改一些没被 git add 的跟踪文件 (rebase 要求干净工作树),
          # autostash 自动暂存并在 rebase 后恢复, 不阻塞 push。
          git pull --rebase --autostash origin main
          git push

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: scan
    if: always()
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
