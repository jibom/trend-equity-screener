name: 每日更新 HK Swing Pattern

on:
  schedule:
    - cron: "0 12 * * *"   # UTC 12:00 = 北京 20:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hk_swing_pattern
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成表格
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          EODHD_TOKEN: ${{ secrets.EODHD_TOKEN }}
        run: python run_swing.py

      - name: 提交并推送
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hk_swing_pattern/HK_Swing_Pattern.xlsx hk_swing_pattern/index.html
          if git diff --cached --quiet; then
            echo "无变化"
          else
            git commit -m "auto: 更新 HK Swing Pattern $(date -u +%Y-%m-%d)"
            git push
          fi
